name: Zero to APK Compiler

on:
  push:
    branches: [ "main", "master" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    - uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'

    - name: Setup Project and Build
      run: |
        mkdir -p app/src/main/java/com/example/ai_app
        mkdir -p gradle/wrapper
        
        # AndroidX Aktif etme
        cat << 'EOF' > gradle.properties
        android.useAndroidX=true
        android.enableJetifier=true
        EOF

        cat << 'EOF' > build.gradle
        buildscript {
            repositories { google(); mavenCentral() }
            dependencies { classpath 'com.android.tools.build:gradle:8.2.2' }
        }
        allprojects { repositories { google(); mavenCentral() } }
        EOF

        cat << 'EOF' > settings.gradle
        include ':app'
        EOF

        # Material 3 ve Compose/M3 bağımlılıkları eklendi
        cat << 'EOF' > app/build.gradle
        plugins { id 'com.android.application'; id 'org.jetbrains.kotlin.android' version '1.9.22' }
        android {
            namespace 'com.example.ai_app'
            compileSdk 34
            defaultConfig { applicationId "com.example.ai_app"; minSdk 24; targetSdk 34; versionCode 1; versionName "1.0" }
            
            // Eğer kod Jetpack Compose + Material 3 ise gerekli derleme ayarı
            buildFeatures { compose true }
            composeOptions { kotlinCompilerExtensionVersion '1.5.8' }
        }
        dependencies {
            implementation 'androidx.core:core-ktx:1.12.0'
            implementation 'androidx.appcompat:appcompat:1.6.1'
            implementation 'com.google.ai.client.generativeai:generativeai:0.2.2'
            
            # Material 3 Bileşenleri
            implementation 'com.google.android.material:material:1.11.0'
            implementation 'androidx.compose.material3:material3:1.2.0'
            implementation 'androidx.compose.ui:ui-tooling-preview:1.6.1'
            implementation 'androidx.activity:activity-compose:1.8.2'
        }
        EOF

        # Manifest dosyası Material 3 temasıyla güncellendi
        cat << 'EOF' > app/src/main/AndroidManifest.xml
        <manifest xmlns:android="http://schemas.android.com/apk/res/android">
            <uses-permission android:name="android.permission.INTERNET" />
            <application android:label="AI App" android:theme="@style/Theme.Material3.DayNight.NoActionBar">
                <activity android:name=".MainActivity" android:exported="true">
                    <intent-filter>
                        <action android:name="android.intent.action.MAIN" />
                        <category android:name="android.intent.category.LAUNCHER" />
                    </intent-filter>
                </activity>
            </application>
        </manifest>
        EOF

        if [ -f "MainActivity.kt" ]; then cp MainActivity.kt app/src/main/java/com/example/ai_app/MainActivity.kt; fi
        
        cat << 'EOF' > gradle/wrapper/gradle-wrapper.properties
        distributionUrl=https\://services.gradle.org/distributions/gradle-8.5-bin.zip
        EOF
        
        curl -sL https://raw.githubusercontent.com/gradle/gradle/v8.5.0/gradlew -o gradlew
        curl -sL https://raw.githubusercontent.com/gradle/gradle/v8.5.0/gradle/wrapper/gradle-wrapper.jar -o gradle/wrapper/gradle-wrapper.jar
        
        chmod +x gradlew
        ./gradlew assembleDebug

    - uses: actions/upload-artifact@v4
      with:
        name: Final-APK
        path: app/build/outputs/apk/debug/app-debug.apk
